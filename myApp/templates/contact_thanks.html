<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message sent — NeuroMed Aira™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700&family=Roboto+Serif:ital,wght@0,400;0,500;0,700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
  :root { --green: #2E8B6A; --navy: #1A2A4A; --ink-mid: #3D4F63; --gradient: linear-gradient(135deg, #2E8B6A 0%, #2D5FA8 100%); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Roboto', sans-serif; background: #FAFCFF; color: #1C2B3A; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .thanks-card { text-align: center; max-width: 480px; }
  .thanks-icon { width: 72px; height: 72px; margin: 0 auto 24px; background: var(--gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; }
  h1 { font-family: 'Roboto Serif', serif; font-size: 28px; font-weight: 500; color: var(--navy); margin-bottom: 12px; }
  p { font-size: 16px; color: var(--ink-mid); line-height: 1.7; margin-bottom: 28px; }
  a { display: inline-flex; align-items: center; gap: 8px; background: var(--gradient); color: white; padding: 14px 28px; border-radius: 100px; text-decoration: none; font-weight: 500; font-size: 14px; transition: opacity 0.2s; }
  a:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div class="thanks-card">
    <div class="thanks-icon"><i class="fa-solid fa-check"></i></div>
    <h1>Message sent</h1>
    <p>Thank you for reaching out. We'll get back to you within one business day.</p>
    <a href="{% url 'home' %}"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
  </div>
</body>
</html>
